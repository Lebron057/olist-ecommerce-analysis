spring.application.name=backend
# ===============================
# CONFIGURAÇÃO DO BANCO DE DADOS (MYSQL VIA DOCKER)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/olist_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURAÇÃO DO JPA / HIBERNATE
# ===============================
# O 'update' diz para o Spring criar ou atualizar as tabelas do banco automaticamente baseado nas suas classes Java
spring.jpa.hibernate.ddl-auto=update

# Mostra no console do Java os comandos SQL que ele está executando por baixo dos panos (ótimo para debugar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# PORTA DO SERVIDOR JAVA
# ===============================
# Rodaremos o Java na 8080 para não dar conflito com a nossa API Python que está na 8000
server.port=8080